[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
board_build.filesystem = littlefs
upload_speed = 460800
monitor_speed = 115200

build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1


lib_deps =
    bblanchon/ArduinoJson@^6.21.2
	gmag11/QuickEspNow
	https://github.com/mavlink/c_library_v2.git

[env:esp32-c3-devkitm-1-mavlink-test]
platform = espressif32
board = dfrobot_beetle_esp32c3
framework = arduino
upload_speed = 460800
monitor_speed = 115200

build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D TEST_MAV_SYS_ID=1
	-D TEST_MAV_COMP_ID=158

build_src_filter =
	-<*>
	+<mavlink_serial_test.cpp>

lib_deps =
	https://github.com/mavlink/c_library_v2.git

[env:esp32-c3-devkitm-1-mavlink-test-sys2]
platform = espressif32
board = dfrobot_beetle_esp32c3
framework = arduino
upload_speed = 460800
monitor_speed = 115200

build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D TEST_MAV_SYS_ID=2
	-D TEST_MAV_COMP_ID=158

build_src_filter =
	-<*>
	+<mavlink_serial_test.cpp>

lib_deps =
	https://github.com/mavlink/c_library_v2.git


